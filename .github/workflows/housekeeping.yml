name: Housekeeping
on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]
jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun install --frozen-lockfile # ensure binaries are linked
      - run: bun run check
      - run: git diff --exit-code