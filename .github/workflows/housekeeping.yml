name: Housekeeping
on:
  push:
    branches: [beta]
  pull_request:
    branches: [beta]
jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - run: bun install
      - run: bun run build
      - run: bun run check
      - run: git diff --exit-code